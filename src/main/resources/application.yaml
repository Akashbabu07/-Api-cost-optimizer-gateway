server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

  metrics:
    url: ${METRICS_SERVICE_URL:http://localhost:8082}

  analytics:
    url: ${ANALYTICS_SERVICE_URL:http://localhost:8083}

  recommendations:
    url: ${RECOMMENDATION_SERVICE_URL:http://localhost:8084}

  dashboard:
    url: ${DASHBOARD_SERVICE_URL:http://localhost:8085}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

resilience4j:
  timelimiter:
    instances:
      analyticsService:
        timeoutDuration: 5s

      recommendationService:
        timeoutDuration: 5s

  circuitbreaker:
    instances:
      analyticsService:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 5

      recommendationService:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 5

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG